title: Academic & Research Blog
email: author@example.com
description: >- # this means to ignore newlines until "baseurl:"
  A minimal academic and research blog documenting my latest findings, code, and notes.
baseurl: "" # the subpath of your site, e.g. /blog
url: "" # the base hostname & protocol for your site, e.g. http://example.com
author: Your Name

# Build settings
markdown: kramdown
highlighter: rouge
plugins:
  - jekyll-paginate

# Kramdown settings for math and code
kramdown:
  math_engine: null # We will use KaTeX on the frontend
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    block:
      line_numbers: true

# Pagination settings
paginate: 5
paginate_path: "/page:num/"

exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/
